<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Вход - Семейный Чат</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-small">💬</div>
            <h2>Вход в чат</h2>
            <p class="subtitle">Введите имя и пароль</p>
            
            <input type="text" id="username" placeholder="Имя пользователя" autocomplete="off">
            <input type="password" id="password" placeholder="Пароль">
            
            <button class="btn-primary" id="loginBtn">Войти</button>
            
            <p class="info-text">
                Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
            </p>
        </div>
    </div>
    
    <script src="/js/login.js"></script>
</body>
</html>
