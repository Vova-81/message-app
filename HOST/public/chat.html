<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Семейный Чат</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="chat-container">
        <!-- Шапка -->
        <div class="chat-header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar"></div>
                <div class="user-details">
                    <div class="user-name" id="currentUserName"></div>
                    <div class="user-status" id="userStatusText">вы</div>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
        </div>
        
        <!-- Основная панель -->
        <div class="main-panel">
            <!-- Левая панель - контакты -->
            <div class="contacts-panel" id="contactsPanel">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по имени...">
                </div>
                <div class="contacts-list" id="contactsList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
            
            <!-- Правая панель - чат -->
            <div class="chat-area" id="chatArea">
                <div class="chat-placeholder" id="chatPlaceholder">
                    <div class="placeholder-icon">💬</div>
                    <h3>Выберите чат</h3>
                    <p>Нажмите на контакт, чтобы начать общение</p>
                </div>
                
                <div class="chat-active" id="chatActive" style="display: none;">
                    <div class="chat-contact-info">
                        <div class="chat-contact-avatar" id="chatContactAvatar"></div>
                        <div class="chat-contact-details">
                            <div class="chat-contact-name" id="chatContactName"></div>
                            <div class="chat-contact-status" id="chatContactStatus">
                                <span class="status-dot"></span> <span id="statusText">не в сети</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messagesContainer"></div>
                    
                    <div class="typing-indicator" id="typingIndicator"></div>
                    
                    <div class="message-input-area">
                        <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
